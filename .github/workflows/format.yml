name: Apply formatting
on:
  push:
    branches:
      - master
      - main

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Ruff - python formatter
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
