site_name: Checkers Robot
site_description: An autonomous checkers-playing robot system integrating computer vision, game AI, and robotic arm manipulation.
site_author: Olek Zima
repo_url: https://github.com/OlekZima/Checkers-Robot-Bachelor

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: true
            show_root_full_path: true
            show_category_heading: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_bases: true
            group_by_category: true
            heading_level: 2
            docstring_style: google
            docstring_options:
              ignore_init_summary: false
              trim_doctest_flags: true

nav:
  - Home: index.md
  - Core Modules:
      - Checkers Game: api/checkers_game.md
      - Game Controller: api/game_controller.md
      - Negamax Engine: api/negamax.md
  - Computer Vision:
      - Contour Detector: api/contour_detector.md
      - Board Tile: api/board_tile.md
      - Tile Grid: api/tile_grid.md
      - Board: api/board.md
      - Board Detector: api/board_detector.md
      - Checker: api/checker.md
      - Checker Detector: api/checker_detector.md
      - Game State Recognition: api/game_state_recognition.md
  - Robot Manipulation:
      - Robot Arm: api/robot_arm.md
      - Dobot Arm: api/dobot_arm.md
      - Move Executor: api/move_executor.md
      - King Manager: api/king_manager.md
      - Robot Manipulator: api/robot_manipulator.md
      - Calibration Controller: api/calibration_controller.md
      - Calibration Data: api/calibration_data.md
      - Calibration File Handler: api/calibration_file_handler.md
  - Common Utilities:
      - Configs: api/configs.md
      - Enums: api/enums.md
      - Exceptions: api/exceptions.md
      - Utils: api/utils.md
  - GUI:
      - Game Window: api/game_window.md
      - Init Window: api/init_window.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
